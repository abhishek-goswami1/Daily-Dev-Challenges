<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphic Navbar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="#" class="navbar-logo">
                <span class="logo-icon">✨</span>
                Brand
            </a>
            <div class="nav-menu">
                <span class="nav-item active"><a href="#home">Home</a></span>
                <span class="nav-item"><a href="#about">About</a></span>
                <span class="nav-item"><a href="#services">Services</a></span>
                <span class="nav-item"><a href="#portfolio">Portfolio</a></span>
                <span class="nav-item"><a href="#contact">Contact</a></span>
            </div>
            <div class="nav-button">
                <button class="btn-primary">Get Started</button>
            </div>
            <div class="hamburger">
                <span class="line1"></span>
                <span class="line2"></span>
                <span class="line3"></span>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to Modern Design</h1>
            <p>Experience the beauty of glassmorphic design with smooth animations and seamless transitions.</p>
            <button class="btn-large">Explore More</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
