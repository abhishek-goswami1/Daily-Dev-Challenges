<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Filter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Product Search Filter</h1>
        <p class="subtitle">Type to search and filter products in real-time</p>

        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search products... (e.g., laptop, phone, tablet)"
                    class="search-input"
                >
                <span class="search-icon">🔍</span>
            </div>
            <div class="filter-info">
                Found: <span id="resultCount">6</span> products
            </div>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be dynamically inserted here -->
        </div>

        <div class="no-results" id="noResults" style="display: none;">
            <p>No products found. Try different keywords!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
