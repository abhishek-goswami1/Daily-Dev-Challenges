<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Animation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="demo-shell">
        <section class="hero">
            <h1>Button Animation</h1>
            <p>Animated buttons with interactive hover states and motion effects.</p>
        </section>

        <section class="button-grid">
            <button class="btn btn-primary">Primary Action</button>
            <button class="btn btn-outline">Secondary Action</button>
            <button class="btn btn-shadow">Elevated Button</button>
            <button class="btn btn-glow">Glow Hover</button>
        </section>
    </main>
</body>
</html>
