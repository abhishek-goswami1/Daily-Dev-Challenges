<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Spinner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="spinner-page">
        <h1>Loading Spinner</h1>
        <p>Simulate a loading state with animated spinners.</p>
        <div class="spinner-shell">
            <div class="spinner" aria-hidden="true"></div>
            <div class="spinner spinner-alt" aria-hidden="true"></div>
            <button id="loadBtn" type="button">Start Loading</button>
            <p id="statusText" class="status">Ready to load content.</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
