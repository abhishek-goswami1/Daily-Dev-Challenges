<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="accordion-page">
        <h1>Accordion UI</h1>
        <div class="accordion" id="accordion">
            <button class="accordion-trigger" aria-expanded="false">Section 1</button>
            <div class="accordion-panel" hidden>
                <p>Content for section 1 appears when the accordion is expanded.</p>
            </div>
            <button class="accordion-trigger" aria-expanded="false">Section 2</button>
            <div class="accordion-panel" hidden>
                <p>Section 2 contains additional details and explanation text.</p>
            </div>
            <button class="accordion-trigger" aria-expanded="false">Section 3</button>
            <div class="accordion-panel" hidden>
                <p>Section 3 is another collapsible area with smooth toggling behavior.</p>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
