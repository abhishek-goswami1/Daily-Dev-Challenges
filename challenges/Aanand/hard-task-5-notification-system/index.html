<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="notification-page">
        <h1>Notification System</h1>
        <p>Send, dismiss, and auto-close notifications.</p>
        <div class="controls">
            <button id="infoBtn" type="button">Add Info</button>
            <button id="successBtn" type="button">Add Success</button>
            <button id="errorBtn" type="button">Add Error</button>
        </div>
        <div id="alerts" class="alerts" aria-live="polite"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
