<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Card Hover | Day 7</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="scene">
        <div class="card" id="card">
            <!-- Glare effect element -->
            <div class="glare-container">
                <div class="glare" id="glare"></div>
            </div>
            
            <div class="card-content">
                <div class="card-header">
                    <span class="badge">PRO</span>
                </div>
                
                <div class="avatar-wrap">
                    <img src="https://ui-avatars.com/api/?name=Joyal+Poudel&background=3b82f6&color=fff&size=200" alt="Joyal Poudel" class="avatar">
                    <div class="ring-glow"></div>
                </div>
                
                <h2 class="name">Joyal Poudel</h2>
                <p class="title">Full Stack Developer</p>
                
                <div class="stats">
                    <div class="stat">
                        <span class="value">Front</span>
                        <span class="label">End</span>
                    </div>
                    <div class="stat divider"></div>
                    <div class="stat">
                        <span class="value">Back</span>
                        <span class="label">End</span>
                    </div>
                </div>
                
                <div class="actions">
                    <button class="btn primary">Connect</button>
                    <button class="btn secondary"><i class="fa-brands fa-github"></i></button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
