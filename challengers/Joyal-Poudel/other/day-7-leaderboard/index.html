<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 7 Leaderboard | Daily Dev Challenges</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-badge">🏆 Day 7 Results</div>
            <h1>Leaderboard</h1>
            <p class="subtitle">Ranking challengers by tasks completed and quality of work</p>
        </header>

        <!-- Top 3 Podium -->
        <section class="podium-section" id="podium">
            <!-- Dynamically rendered -->
        </section>

        <!-- Full Rankings Table -->
        <section class="rankings-section">
            <div class="rankings-header">
                <h2>Full Rankings</h2>
                <span class="live-badge"><span class="dot"></span>Live</span>
            </div>
            <div class="rankings-list" id="rankings-list">
                <!-- Dynamically rendered -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
