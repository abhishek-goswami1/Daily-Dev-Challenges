<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Spinner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <h1>Loading Spinner</h1>
        <p class="description">Multiple loading spinner animations with smooth transitions.</p>

        <div class="spinners-grid">
            <div class="spinner-wrapper">
                <h3>Classic Ring</h3>
                <div class="spinner-container">
                    <div class="spinner spinner-ring"></div>
                </div>
            </div>

            <div class="spinner-wrapper">
                <h3>Bouncing Dots</h3>
                <div class="spinner-container">
                    <div class="spinner spinner-dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            </div>

            <div class="spinner-wrapper">
                <h3>Pulse</h3>
                <div class="spinner-container">
                    <div class="spinner spinner-pulse"></div>
                </div>
            </div>

            <div class="spinner-wrapper">
                <h3>Double Ring</h3>
                <div class="spinner-container">
                    <div class="spinner spinner-double">
                        <div></div>
                        <div></div>
                    </div>
                </div>
            </div>

            <div class="spinner-wrapper">
                <h3>Line Spin</h3>
                <div class="spinner-container">
                    <div class="spinner spinner-line">
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                </div>
            </div>

            <div class="spinner-wrapper">
                <h3>Square Spin</h3>
                <div class="spinner-container">
                    <div class="spinner spinner-square"></div>
                </div>
            </div>
        </div>

        <div class="full-screen-demo">
            <button id="toggle-fullscreen" class="btn">Show Full Screen Spinner</button>
        </div>

        <div id="fullscreen-spinner" class="fullscreen-spinner hidden">
            <div class="spinner-modal">
                <div class="spinner spinner-ring"></div>
                <p>Loading...</p>
                <button id="close-fullscreen" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
