<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="tabs-page">
        <h1>Tab System</h1>
        <div class="tabs" role="tablist" aria-label="Sample tabs">
            <button role="tab" aria-selected="true" aria-controls="panel-1" id="tab-1">Overview</button>
            <button role="tab" aria-selected="false" aria-controls="panel-2" id="tab-2">Features</button>
            <button role="tab" aria-selected="false" aria-controls="panel-3" id="tab-3">Pricing</button>
        </div>
        <section id="panel-1" role="tabpanel" aria-labelledby="tab-1">
            <h2>Overview</h2>
            <p>Discover how this tabbed interface keeps content organized and easy to use.</p>
        </section>
        <section id="panel-2" role="tabpanel" aria-labelledby="tab-2" hidden>
            <h2>Features</h2>
            <p>Switch quickly between sections for a smoother user experience.</p>
        </section>
        <section id="panel-3" role="tabpanel" aria-labelledby="tab-3" hidden>
            <h2>Pricing</h2>
            <p>Use tabs to present information without adding extra page clutter.</p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
