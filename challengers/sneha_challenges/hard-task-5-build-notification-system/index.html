<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hard Task 5: Notification System</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f1f5f9; color: #0f172a; padding: 2rem; }
    .page { width: 100%; max-width: 720px; background: #ffffff; border-radius: 24px; box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08); padding: 2rem; }
    h1 { margin: 0 0 0.5rem; }
    p { margin: 0 0 1.5rem; color: #475569; }
    .buttons { display: flex; flex-wrap: wrap; gap: 0.9rem; margin-bottom: 1.75rem; }
    .buttons button { border: none; border-radius: 999px; padding: 0.9rem 1.3rem; font-weight: 700; cursor: pointer; color: white; min-width: 130px; }
    .success { background: #16a34a; }
    .info { background: #2563eb; }
    .error { background: #dc2626; }
    .notification { display: none; gap: 1rem; align-items: center; border-radius: 18px; padding: 1rem 1.2rem; color: white; margin-top: 1rem; }
    .notification.show { display: flex; }
    .notification.success { background: #16a34a; }
    .notification.info { background: #2563eb; }
    .notification.error { background: #dc2626; }
    .notification span { flex: 1; }
    .close { background: transparent; border: none; color: white; font-size: 1.1rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Notification System</h1>
    <p>Show notifications with types, auto-dismiss, and manual close support.</p>
    <div class="buttons">
      <button class="success" data-type="success">Show Success</button>
      <button class="info" data-type="info">Show Info</button>
      <button class="error" data-type="error">Show Error</button>
    </div>
    <div class="notification" id="notification">
      <span id="message"></span>
      <button class="close" id="close">×</button>
    </div>
  </div>

  <script>
    const notification = document.getElementById('notification');
    const messageEl = document.getElementById('message');
    const closeButton = document.getElementById('close');
    let timeoutId;

    function showNotification(type, text) {
      clearTimeout(timeoutId);
      notification.className = `notification show ${type}`;
      messageEl.textContent = text;
      timeoutId = setTimeout(hideNotification, 4500);
    }

    function hideNotification() {
      notification.className = 'notification';
    }

    document.querySelectorAll('.buttons button').forEach(button => {
      button.addEventListener('click', () => {
        const type = button.dataset.type;
        showNotification(type, `${type.charAt(0).toUpperCase() + type.slice(1)} notification displayed.`);
      });
    });

    closeButton.addEventListener('click', hideNotification);
  </script>
</body>
</html>
