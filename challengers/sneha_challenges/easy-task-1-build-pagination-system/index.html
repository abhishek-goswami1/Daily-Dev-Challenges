<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy Task 1: Pagination System</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; min-height: 100vh; margin: 0; background: #eef4ff; color: #102a43; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .page { background: #ffffff; width: 100%; max-width: 640px; border-radius: 18px; box-shadow: 0 16px 40px rgba(16, 42, 67, 0.08); padding: 2rem; }
    h1 { margin: 0 0 1rem; font-size: clamp(1.75rem, 2.5vw, 2.25rem); }
    .items { display: grid; gap: 0.75rem; margin: 1.5rem 0; }
    .item { padding: 1rem 1.1rem; background: #f8fbff; border: 1px solid #dbeafe; border-radius: 12px; }
    .pagination { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-top: 1rem; }
    button { border: none; border-radius: 10px; padding: 0.85rem 1.1rem; cursor: pointer; font-weight: 600; background: #2563eb; color: white; transition: transform 0.1s ease, background 0.2s ease; }
    button:hover { transform: translateY(-1px); }
    button[disabled] { background: #94a3b8; cursor: not-allowed; }
    .status { text-align: center; margin-top: 1rem; color: #475569; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Pagination System</h1>
    <p>Browse items by page using the pagination controls below.</p>

    <div class="items" id="items"></div>

    <div class="pagination" id="pagination"></div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const items = Array.from({ length: 27 }, (_, i) => `Item ${i + 1}`);
    const perPage = 6;
    let currentPage = 1;

    const itemsContainer = document.getElementById('items');
    const paginationContainer = document.getElementById('pagination');
    const status = document.getElementById('status');

    function render() {
      const start = (currentPage - 1) * perPage;
      const pageItems = items.slice(start, start + perPage);
      itemsContainer.innerHTML = pageItems.map(text => `<div class="item">${text}</div>`).join('');
      paginationContainer.innerHTML = '';

      const prevButton = document.createElement('button');
      prevButton.textContent = 'Previous';
      prevButton.disabled = currentPage === 1;
      prevButton.addEventListener('click', () => { currentPage--; render(); });
      paginationContainer.appendChild(prevButton);

      const totalPages = Math.ceil(items.length / perPage);
      for (let i = 1; i <= totalPages; i++) {
        const pageButton = document.createElement('button');
        pageButton.textContent = i;
        pageButton.style.background = i === currentPage ? '#1d4ed8' : '#2563eb';
        pageButton.addEventListener('click', () => { currentPage = i; render(); });
        paginationContainer.appendChild(pageButton);
      }

      const nextButton = document.createElement('button');
      nextButton.textContent = 'Next';
      nextButton.disabled = currentPage === totalPages;
      nextButton.addEventListener('click', () => { currentPage++; render(); });
      paginationContainer.appendChild(nextButton);

      status.textContent = `Showing page ${currentPage} of ${totalPages} (${items.length} items total)`;
    }

    render();
  </script>
</body>
</html>
