<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medium Task 4: Accordion UI</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; background: #f8fafc; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; color: #0f172a; }
    .container { width: 100%; max-width: 760px; background: white; border-radius: 22px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); overflow: hidden; }
    .header { padding: 1.8rem 2rem; border-bottom: 1px solid #e2e8f0; }
    .header h1 { margin: 0; }
    .accordion { border-top: 1px solid #e2e8f0; }
    .item { border-bottom: 1px solid #e2e8f0; }
    button { width: 100%; padding: 1.2rem 1.4rem; border: none; background: transparent; text-align: left; font-size: 1rem; font-weight: 700; color: #102a43; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; padding: 0 1.4rem; }
    .content.open { padding: 1rem 1.4rem 1.5rem; }
    .content p { margin: 0; color: #475569; line-height: 1.75; }
    .caret { transition: transform 0.25s ease; }
    .caret.open { transform: rotate(180deg); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Accordion UI</h1>
      <p>Toggle each section to reveal more information.</p>
    </div>
    <div class="accordion" id="accordion"></div>
  </div>

  <script>
    const data = [
      { title: 'Accordion item 1', content: 'This panel expands when clicked, showing additional details clearly and smoothly.' },
      { title: 'Accordion item 2', content: 'Only one section stays open at a time for a compact and accessible layout.' },
      { title: 'Accordion item 3', content: 'Keyboard-friendly and easy to use, ideal for FAQ sections or feature lists.' }
    ];

    const accordion = document.getElementById('accordion');
    data.forEach((item, index) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'item';

      const button = document.createElement('button');
      button.type = 'button';
      button.innerHTML = `<span>${item.title}</span><span class="caret">▼</span>`;

      const content = document.createElement('div');
      content.className = 'content';
      content.innerHTML = `<p>${item.content}</p>`;

      button.addEventListener('click', () => {
        const openItem = document.querySelector('.content.open');
        if (openItem && openItem !== content) {
          openItem.classList.remove('open');
          openItem.style.maxHeight = null;
          openItem.previousElementSibling.querySelector('.caret').classList.remove('open');
        }
        const isOpen = content.classList.toggle('open');
        content.style.maxHeight = isOpen ? `${content.scrollHeight}px` : null;
        button.querySelector('.caret').classList.toggle('open', isOpen);
      });

      wrapper.appendChild(button);
      wrapper.appendChild(content);
      accordion.appendChild(wrapper);
    });
  </script>
</body>
</html>
