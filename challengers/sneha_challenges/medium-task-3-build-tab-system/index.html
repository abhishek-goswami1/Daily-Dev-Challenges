<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medium Task 3: Tab System</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; min-height: 100vh; margin: 0; background: #f8fafc; color: #0f172a; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .tabs-page { width: 100%; max-width: 700px; background: #ffffff; border-radius: 22px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); overflow: hidden; }
    .tabs-header { display: grid; grid-template-columns: repeat(3, 1fr); background: #e2e8f0; }
    .tabs-header button { border: none; padding: 1rem 1.2rem; background: transparent; cursor: pointer; color: #334155; font-weight: 700; transition: background 0.2s ease, color 0.2s ease; }
    .tabs-header button.active { background: #2563eb; color: white; }
    .tab-panel { padding: 2rem; }
    .tab-panel p { line-height: 1.7; color: #475569; }
  </style>
</head>
<body>
  <div class="tabs-page">
    <div class="tabs-header">
      <button class="tab-button active" data-tab="1">Overview</button>
      <button class="tab-button" data-tab="2">Design</button>
      <button class="tab-button" data-tab="3">Usage</button>
    </div>
    <div class="tab-panel" id="tab-panel">
      <h1>Tab System</h1>
      <p>Use this tabbed interface to switch between different sections while staying on one page.</p>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab-button');
    const panel = document.getElementById('tab-panel');

    const pages = {
      1: {
        title: 'Overview',
        content: 'This tab system demonstrates how to change content dynamically when a user selects a tab.'
      },
      2: {
        title: 'Design',
        content: 'A clean tab layout with active styling and accessible button controls for a modern UI.'
      },
      3: {
        title: 'Usage',
        content: 'Click any tab to update the content area instantly without page reload.'
      }
    };

    tabs.forEach(button => {
      button.addEventListener('click', () => {
        tabs.forEach(item => item.classList.remove('active'));
        button.classList.add('active');
        const tabId = button.dataset.tab;
        panel.innerHTML = `<h1>${pages[tabId].title}</h1><p>${pages[tabId].content}</p>`;
      });
    });
  </script>
</body>
</html>
