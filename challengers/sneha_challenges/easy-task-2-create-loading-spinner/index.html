<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy Task 2: Loading Spinner</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; min-height: 100vh; margin: 0; background: #fff7ed; color: #12345a; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { width: 100%; max-width: 520px; background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 18px 45px rgba(22, 38, 70, 0.08); text-align: center; }
    h1 { margin: 0 0 0.75rem; }
    p { margin: 0 0 1.5rem; color: #475569; }
    .spinner { width: 84px; height: 84px; margin: 0 auto 1.5rem; border: 10px solid #f1f5f9; border-top-color: #fb923c; border-radius: 50%; animation: spin 1s linear infinite; }
    .row { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    button { border: none; cursor: pointer; border-radius: 999px; padding: 0.9rem 1.4rem; background: #fb923c; color: white; font-weight: 700; transition: filter 0.2s ease; }
    button:hover { filter: brightness(1.05); }
    .hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Loading Spinner</h1>
    <p>Simulate a loading state using a spinner component.</p>
    <div id="spinner" class="spinner"></div>
    <div class="row">
      <button id="start">Start Load</button>
      <button id="stop">Stop Load</button>
    </div>
    <p id="message">Press start to see the spinner animate.</p>
  </div>

  <script>
    const spinner = document.getElementById('spinner');
    const message = document.getElementById('message');
    const startButton = document.getElementById('start');
    const stopButton = document.getElementById('stop');

    function setLoading(isLoading) {
      spinner.style.opacity = isLoading ? '1' : '0.25';
      message.textContent = isLoading ? 'Loading in progress...' : 'Loading stopped.';
    }

    startButton.addEventListener('click', () => setLoading(true));
    stopButton.addEventListener('click', () => setLoading(false));
    setLoading(false);
  </script>
</body>
</html>
