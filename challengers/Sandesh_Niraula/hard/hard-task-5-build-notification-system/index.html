<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Notification System</h1>

        <div class="controls">
            <div class="control-group">
                <label for="notifType">Type:</label>
                <select id="notifType">
                    <option value="success">Success</option>
                    <option value="error">Error</option>
                    <option value="info">Info</option>
                    <option value="warning">Warning</option>
                </select>
            </div>

            <div class="control-group">
                <label for="notifMessage">Message:</label>
                <input 
                    type="text" 
                    id="notifMessage" 
                    placeholder="Enter notification message"
                    value="Operation completed successfully!"
                >
            </div>

            <div class="control-group">
                <label for="notifDuration">Duration (ms):</label>
                <input 
                    type="number" 
                    id="notifDuration" 
                    min="1000" 
                    max="10000" 
                    step="1000"
                    value="4000"
                >
            </div>

            <button class="btn-show" onclick="showNotification()">Show Notification</button>
        </div>

        <div class="quick-buttons">
            <h2>Quick Examples</h2>
            <div class="button-group">
                <button class="btn btn-success" onclick="quickNotification('success', 'Success! Your changes have been saved.')">Success</button>
                <button class="btn btn-error" onclick="quickNotification('error', 'Error! Something went wrong. Please try again.')">Error</button>
                <button class="btn btn-info" onclick="quickNotification('info', 'Info: You have a new message.')">Info</button>
                <button class="btn btn-warning" onclick="quickNotification('warning', 'Warning: Please review your input before proceeding.')">Warning</button>
            </div>
        </div>

        <div class="multiple-notif">
            <h2>Multiple Notifications</h2>
            <button class="btn btn-primary" onclick="showMultipleNotifications()">Trigger Multiple</button>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer" class="notification-container"></div>

    <script src="script.js"></script>
</body>
</html>
