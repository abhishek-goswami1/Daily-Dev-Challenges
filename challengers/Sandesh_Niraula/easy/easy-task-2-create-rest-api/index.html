<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="api-wrapper">
            <h1>REST API Demo</h1>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="get">GET Users</button>
                <button class="tab-btn" data-tab="create">Create Post</button>
                <button class="tab-btn" data-tab="update">Update User</button>
                <button class="tab-btn" data-tab="delete">Delete User</button>
            </div>

            <!-- GET Users Tab -->
            <div id="get" class="tab-content active">
                <h2>Get All Users</h2>
                <button class="api-btn" onclick="fetchUsers()">Fetch Users from API</button>
                <div id="usersList" class="results"></div>
            </div>

            <!-- Create Post Tab -->
            <div id="create" class="tab-content">
                <h2>Create a Post</h2>
                <form id="createForm" class="form">
                    <input type="text" id="postTitle" placeholder="Post Title" required>
                    <textarea id="postBody" placeholder="Post Body" rows="4" required></textarea>
                    <input type="number" id="postUserId" placeholder="User ID (1-10)" min="1" max="10" required>
                    <button type="button" class="api-btn" onclick="createPost()">Create Post</button>
                </form>
                <div id="createResult" class="results"></div>
            </div>

            <!-- Update User Tab -->
            <div id="update" class="tab-content">  
                <h2>Update User Data</h2>
                <form class="form">
                    <input type="number" id="updateUserId" placeholder="User ID" required>
                    <input type="text" id="updateUserName" placeholder="New Name">
                    <input type="email" id="updateUserEmail" placeholder="New Email">
                    <button type="button" class="api-btn" onclick="updateUser()">Update User</button>
                </form>
                <div id="updateResult" class="results"></div>
            </div>

            <!-- Delete User Tab -->
            <div id="delete" class="tab-content">
                <h2>Delete User</h2>
                <form class="form">
                    <input type="number" id="deleteUserId" placeholder="User ID" required>
                    <button type="button" class="api-btn" onclick="deleteUser()">Delete User</button>
                </form>
                <div id="deleteResult" class="results"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
