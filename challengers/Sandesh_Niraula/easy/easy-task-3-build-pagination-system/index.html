<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagination System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="pagination-wrapper">
            <h1>Pagination System</h1>
            
            <div class="controls">
                <label for="itemsPerPage">Items per page:</label>
                <select id="itemsPerPage">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                </select>
                
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search items..."
                >
            </div>

            <div id="itemsList" class="items-list">
                <!-- Items will be rendered here -->
            </div>

            <div class="pagination-controls">
                <button id="prevBtn" class="pagination-btn">← Previous</button>
                
                <div id="pageNumbers" class="page-numbers">
                    <!-- Page numbers will be rendered here -->
                </div>

                <button id="nextBtn" class="pagination-btn">Next →</button>
            </div>

            <div class="pagination-info">
                <p>Page <span id="currentPage">1</span> of <span id="totalPages">1</span></p>
                <p>Showing <span id="startItem">1</span> to <span id="endItem">10</span> of <span id="totalItems">0</span> items</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
