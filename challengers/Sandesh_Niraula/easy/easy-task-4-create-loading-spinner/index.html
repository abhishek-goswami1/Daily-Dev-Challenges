<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Spinner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="spinner-wrapper">
            <h1>Loading Spinner Showcase</h1>
            
            <div class="spinner-section">
                <h2>Basic Spinners</h2>
                <div class="spinners-grid">
                    <div class="spinner-demo">
                        <div class="spinner spinner1"></div>
                        <p>Rotating Circle</p>
                    </div>
                    <div class="spinner-demo">
                        <div class="spinner spinner2"></div>
                        <p>Border Spinner</p>
                    </div>
                    <div class="spinner-demo">
                        <div class="spinner spinner3"></div>
                        <p>Pulse Spinner</p>
                    </div>
                    <div class="spinner-demo">
                        <div class="spinner spinner4"></div>
                        <p>Dot Spinner</p>
                    </div>
                </div>
            </div>

            <div class="spinner-section">
                <h2>Advanced Spinners</h2>
                <div class="spinners-grid">
                    <div class="spinner-demo">
                        <div class="spinner spinner5"></div>
                        <p>Multi-Ring</p>
                    </div>
                    <div class="spinner-demo">
                        <div class="spinner spinner6"></div>
                        <p>Orbit</p>
                    </div>
                    <div class="spinner-demo">
                        <div class="spinner spinner7"></div>
                        <p>Wave</p>
                    </div>
                    <div class="spinner-demo">
                        <div class="spinner spinner8"></div>
                        <p>Bounce</p>
                    </div>
                </div>
            </div>

            <div class="spinner-section">
                <h2>Loading States</h2>
                <button class="load-btn" onclick="simulateLoading()">Simulate Loading (3s)</button>
                <div id="loadingDemo" class="loading-demo">
                    <div class="spinner spinner1"></div>
                    <p id="loadingText">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
