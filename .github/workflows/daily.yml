name: Daily Challenge System (7-Day Project Build)

on:
  schedule:
    - cron: "0 3 * * *" # Runs every day at 3:00 AM
  workflow_dispatch:

jobs:
  daily-system:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Generate Challenges
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const allIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all"
            });

            const challengeIssues = allIssues.data.filter(i => i.title.includes("Phase"));
            const currentDay = (challengeIssues.length % 7) + 1;

            const projectPhases = [
              {
                title: "Project Setup & Clean Architecture",
                task: "Initialize your React/Vite project. Set up Tailwind CSS and create the folder structure provided in the guide.",
                details: "Focus on clean config files (.prettierrc, tailwind.config.js)."
              },
              {
                title: "The Glassmorphic Navbar",
                task: "Build a responsive navigation bar with a glassmorphism effect (backdrop-blur).",
                details: "Ensure it has smooth hover states for links."
              },
              {
                title: "Hero Section & GSAP Entry",
                task: "Create a cinematic Hero section. Use GSAP to animate the text entering the screen.",
                details: "Focus on typography and white space."
              },
              {
                title: "Projects Grid (Data Mapping)",
                task: "Create a JSON file with project data and map through it to display 'Project Cards'.",
                details: "Practice clean component reusability."
              },
              {
                title: "Custom Hook & Dark Mode",
                task: "Implement a `useTheme` custom hook to toggle between Dark and Light modes.",
                details: "Store the preference in localStorage."
              },
              {
                title: "Contact Form & Form Validation",
                task: "Build a functional UI for a contact form with real-time regex validation.",
                details: "Handle 'Success' and 'Error' states visually."
              },
              {
                title: "Deployment & Final Polish",
                task: "Optimize images, fix any responsive bugs, and deploy the site to Vercel or Netlify.",
                details: "Add a 'Built by Me' footer."
              }
            ];

            const phase = projectPhases[currentDay - 1];

            // 1. Close Yesterday's Issues
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            for (const issue of openIssues.data) {
              if (issue.title.includes(`Phase ${currentDay - 1}`)) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: "closed"
                });
              }
            }

            // 2. Create the New Phase Issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚀 Day ${currentDay}: Phase ${currentDay} - ${phase.title}`,
              body: `## 🔴 WARNING: NO AI CHALLENGE\n` +
                    `> **This project is for your growth. Using AI to generate the code defeats the purpose. Try to solve logic and CSS issues using documentation and MDN.**\n\n` +
                    `### 🛠 Phase ${currentDay} Task\n` +
                    `**Objective:** ${phase.task}\n\n` +
                    `**Pro Tip:** ${phase.details}\n\n` +
                    `### 📂 Recommended Folder Structure\n` +
                    `\`\`\`text\n` +
                    `src/\n` +
                    ` ├── assets/      # Images, Icons, SVGs\n` +
                    ` ├── components/  # Reusable UI (Navbar, Button)\n` +
                    ` ├── hooks/       # Custom React Hooks\n` +
                    ` ├── sections/    # Page Sections (Hero, Contact)\n` +
                    ` ├── styles/      # Global CSS\n` +
                    ` └── App.jsx\n` +
                    `\`\`\`\n\n` +
                    `**Submission Folder:** \`projects/portfolio/day-${currentDay}/abhishekgoswami/\`\n` +
                    `--- \n` +
                    `🔥 **Goal:** Commit your progress daily to build your GitHub streak!`,
              labels: ["7-day-challenge", `day-${currentDay}`]
            });
